{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:500px;padding-top:4rem;">
    <div class="card" style="text-align:center;">
        <div class="card-body" style="padding:3rem;">
            {% if success %}
            <div style="font-size:3rem;margin-bottom:.75rem;">&#9989;</div>
            <h3>邮箱验证成功！</h3>
            <p style="color:var(--text-dim);margin-top:.5rem;">{{ success | safe }}</p>
            {% elif error %}
            <div style="font-size:3rem;margin-bottom:.75rem;">&#10060;</div>
            <h3>验证失败</h3>
            <p class="alert alert-danger" style="display:inline-block;">{{ error }}</p>
            {% endif %}
            <a href="/" class="btn btn-primary" style="margin-top:1.5rem;">返回首页</a>
        </div>
    </div>
</div>
{% endblock %}
