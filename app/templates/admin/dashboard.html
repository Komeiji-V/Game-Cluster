{% extends "admin/base.html" %}
{% block admin_content %}
<h4 class="fw-bold mb-4">仪表盘</h4>
<div class="row g-3">
    <div class="col-md-4"><div class="card text-center py-4 border-0" style="background:#f9fafb;"><h2 class="fw-bold" style="color:var(--acc);">{{ total_users }}</h2><p class="text-muted mb-0 small">总用户数</p></div></div>
    <div class="col-md-4"><div class="card text-center py-4 border-0" style="background:#f9fafb;"><h2 class="fw-bold" style="color:#16a34a;">{{ total_games }}</h2><p class="text-muted mb-0 small">游戏总数</p></div></div>
    <div class="col-md-4"><div class="card text-center py-4 border-0" style="background:#f9fafb;"><h2 class="fw-bold" style="color:#ea580c;">{{ total_scores }}</h2><p class="text-muted mb-0 small">已提交分数</p></div></div>
</div>
{% endblock %}
